<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPIC Software Dev Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Default Dark Mode Variables */
        :root {
            --primary: #b349f6;
            --bg: #231f25;
            --surface: #332d39;
            --text: #f8fafc;
            --border: #4b4255;
            
            --badge-note-bg: rgba(37, 99, 235, 0.2);
            --badge-note-text: #60a5fa;
            --badge-assign-bg: rgba(220, 38, 38, 0.2);
            --badge-assign-text: #f87171;
            /* New Exercise Colors (Emerald Green) */
            --badge-exercise-bg: rgba(16, 185, 129, 0.2); 
            --badge-exercise-text: #34d399;
        }

        /* Light Mode Variables */
        body.light-mode {
            --primary: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            
            --badge-note-bg: #dbeafe;
            --badge-note-text: #1d4ed8;
            --badge-assign-bg: #fee2e2;
            --badge-assign-text: #b91c1c;
            --badge-exercise-bg: #d1fae5;
            --badge-exercise-text: #059669;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }

        #app {
            max-width: 800px;
            margin: 2rem auto 0;
            background: var(--surface);
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: background-color 0.3s ease;
        }

        h1, h2, h3 { color: var(--primary); }
        
        /* Search Bar Styles */
        .search-container {
            margin-bottom: 2rem;
        }
        .search-bar {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Badges for Classification */
        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge-notes {
            background-color: var(--badge-note-bg);
            color: var(--badge-note-text);
        }
        .badge-assignment {
            background-color: var(--badge-assign-bg);
            color: var(--badge-assign-text);
        }
        /* New Exercise Badge Class */
        .badge-exercise {
            background-color: var(--badge-exercise-bg);
            color: var(--badge-exercise-text);
        }

        /* 2-Column Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            #app { padding: 1.5rem; }
        }

        .card {
            display: block;
            padding: 1.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: background-color 0.2s;
        }
        .list-item:hover { background: var(--surface); color: var(--primary); }
        .list-item-text {
            padding-right: 1rem; 
        }
        
        .nav-buttons { margin-bottom: 2rem; }
        
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .btn:hover { background: var(--bg); border-color: var(--primary); }
        
        /* Markdown Styles including Links */
        .markdown-body a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body img { max-width: 100%; border-radius: 6px; }
        .markdown-body pre { background: var(--bg); padding: 1rem; border-radius: 6px; overflow-x: auto; }
        .markdown-body code { background: var(--bg); padding: 0.2rem 0.4rem; border-radius: 4px; }
        .markdown-body a { color: #495cd8; }
        .error { color: #fca5a5; padding: 1rem; background: #7f1d1d; border-radius: 6px; }
        
        /* Markdown Table Styles */
.markdown-body table {
    width: 100%;
    border-collapse: collapse; /* This ensures borders combine into a single line */
    margin: 1.5rem 0;
}

.markdown-body th, 
.markdown-body td {
    border: 1px solid var(--border); /* Uses your auto-switching border color */
    padding: 0.75rem 1rem; /* Adds the breathing room (top/bottom, left/right) */
    text-align: left;
}

.markdown-body th {
    background-color: var(--bg); /* Gives the header row a subtle contrasting background */
    font-weight: 600;
}
    </style>
</head>
<body>

    <button id="theme-toggle" class="btn">🌗 Toggle Theme</button>

    <div id="app"></div>

    <script>
        // --- 0. DARK MODE (DEFAULT) LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        // --- 1. CLASSIFIED CURRICULUM DATA ---
        const curriculum = {
            "Pi's-and-Python": [
                { file: "Over-the-Wire-Lab", type: "assignment" },
                // { file: "Terminal-Commands-Exercises", type: "exercise" },
                { file: "Text-Editors-Lab", type: "assignment" },
                { file: "Meet-Your-Raspberry-Pi-Lab", type: "assignment" },
                // {  file: "Working-with-Raspberry-Pi-Notes", type: "notes" },
                { file: "Light-the-LED-Lab", type: "assignment" },
                { file: "Dim-the-LED-Lab", type:"assignment"},
                { file: "Temperature-in-Color-Lab", type:"assignment"},
                { file: "Objects-Notes", type: "notes" },
                { file: "File-Reading-and-Writing-Notes", type: "notes" },
                { file: "Fun-With-Objects-Lab", type: "assignment" },
                { file: "Digital-Slot-Machine-Lab", type:"assignment"},
                
                { file: "Recursion-Lab", type:"assignment"},
                { file: "Binary-Display-Lab", type:"assignment"},
                
                
            ],
            "Data-Structures-and-Algorithms": [
                { file: "Object-Review-Lab", type: "assignment"},
                { file: "Quad-Sorts-Lab", type: "assignment" },
                { file: "Stack-and-Queue-Lab", type: "assignment" },
                { file: "Reverse-Polish-Notation-Lab", type: "assignment" },
                { file: "ArrayList-Lab", type: "assignment" },
                { file: "Doubly-Linked-List-Lab", type: "assignment" },
                { file: "Binary-Search-Tree-Lab", type: "assignment" },
                { file: "Priority-Queue-Lab", type: "assignment" },
                { file: "Graphs-Lab", type: "assignment" },
                { file: "Radix-Sort-Lab", type: "assignment" }
            ],
            "Software-Engineering": [
                { file: "project", type: "assignment" }
            ],
            "Foundations-of-AI": [
                { file: "notes", type: "notes" }
            ],
            "Workforce-Readiness": [
                { file: "Creating-a-Resume", type: "assignment" }
            ]
        };


        const appDiv = document.getElementById('app');

        // --- 2. ROUTING LOGIC ---
        function render() {
            const hash = window.location.hash.substring(1); 
            
            if (!hash) {
                renderHub();
            } else if (hash.includes('/')) {
                const [className, assignmentName] = hash.split('/');
                renderAssignment(className, assignmentName);
            } else {
                renderClassPage(hash);
            }
        }

        // --- Helper Function to get Badge Class ---
        function getBadgeClass(type) {
            if (type === 'notes') return 'badge-notes';
            if (type === 'assignment') return 'badge-assignment';
            if (type === 'exercise') return 'badge-exercise';
            return ''; // Default fallback
        }

        // --- Helper Function to Render List Items ---
        function generateFileListHTML(className, files) {
            if (files.length === 0) return `<p>No matching files found.</p>`;
            
            let html = '';
            files.forEach(item => {
                const cleanFileName = item.file.replace(/-/g, ' ');
                const badgeClass = getBadgeClass(item.type);
                
                html += `
                    <a href="#${className}/${item.file}" class="list-item">
                        <span class="list-item-text">${cleanFileName}</span>
                        <span class="badge ${badgeClass}">${item.type.toUpperCase()}</span>
                    </a>
                `;
            });
            return html;
        }

        // --- 3. RENDER FUNCTIONS ---
        function renderHub() {
            let html = `
                <h1>EPIC Software Development Courses</h1>
                
                <div class="search-container">
                    <input type="text" id="search-input" class="search-bar" placeholder="Search all files globally...">
                </div>

                <div id="default-view">
                    <p>Select a class to view assignments and notes:</p>
                    <div class="grid">
            `;
            
            for (const className in curriculum) {
                const displayName = className.replace(/-/g, ' '); 
                html += `<a href="#${className}" class="card">${displayName}</a>`;
            }
            
            html += `
                    </div>
                </div>
                <div id="search-results"></div>
            `;
            
            appDiv.innerHTML = html;
            document.getElementById('search-input').addEventListener('input', handleGlobalSearch);
        }

        // --- 4. GLOBAL SEARCH LOGIC ---
        function handleGlobalSearch(event) {
            const query = event.target.value.toLowerCase();
            const defaultView = document.getElementById('default-view');
            const searchResults = document.getElementById('search-results');

            if (query.trim() === '') {
                defaultView.style.display = 'block';
                searchResults.innerHTML = '';
                return;
            }

            defaultView.style.display = 'none';
            let resultsHtml = `<h3>Search Results</h3><div>`;
            let matchCount = 0;

            for (const className in curriculum) {
                curriculum[className].forEach(item => {
                    const cleanFileName = item.file.replace(/-/g, ' ');
                    const cleanClassName = className.replace(/-/g, ' ');
                    
                    if (cleanFileName.toLowerCase().includes(query) || 
                        cleanClassName.toLowerCase().includes(query) ||
                        item.type.toLowerCase().includes(query)) {
                        
                        const badgeClass = getBadgeClass(item.type);
                        
                        resultsHtml += `
                            <a href="#${className}/${item.file}" class="list-item">
                                <span class="list-item-text"><strong>${cleanClassName}</strong>: ${cleanFileName}</span>
                                <span class="badge ${badgeClass}">${item.type.toUpperCase()}</span>
                            </a>
                        `;
                        matchCount++;
                    }
                });
            }

            resultsHtml += `</div>`;

            if (matchCount === 0) {
                searchResults.innerHTML = `<p>No files found matching "${query}".</p>`;
            } else {
                searchResults.innerHTML = resultsHtml;
            }
        }

        // --- 5. CLASS PAGE WITH SEARCH ---
        function renderClassPage(className) {
            if (!curriculum[className]) return renderHub(); 
            
            const displayName = className.replace(/-/g, ' ');
            let html = `
                <div class="nav-buttons">
                    <a href="#" class="btn">← Back to Hub</a>
                </div>
                <h2>${displayName} Files</h2>
                
                <div class="search-container">
                    <input type="text" id="class-search-input" class="search-bar" placeholder="Search within ${displayName}...">
                </div>

                <div id="class-file-list">
                    ${generateFileListHTML(className, curriculum[className])}
                </div>
            `;
            
            appDiv.innerHTML = html;

            document.getElementById('class-search-input').addEventListener('input', (event) => {
                const query = event.target.value.toLowerCase();
                
                const filteredFiles = curriculum[className].filter(item => {
                    const cleanFileName = item.file.replace(/-/g, ' ').toLowerCase();
                    return cleanFileName.includes(query) || item.type.includes(query);
                });
                
                document.getElementById('class-file-list').innerHTML = generateFileListHTML(className, filteredFiles);
            });
        }

        // --- 6. RENDER INDIVIDUAL FILE ---
        async function renderAssignment(className, assignmentName) {
            appDiv.innerHTML = `<p>Loading...</p>`;
            try {
                const response = await fetch(`markdown/${className}/${assignmentName}.md`);
                if (!response.ok) throw new Error('Markdown file not found.');
                
                const markdownText = await response.text();
                const htmlContent = marked.parse(markdownText); 
                
                appDiv.innerHTML = `
                    <div class="nav-buttons">
                        <a href="#${className}" class="btn">← Back to Class</a>
                    </div>
                    <div class="markdown-body">
                        ${htmlContent}
                    </div>
                `;

                // --- NEW CODE: INTERNAL LINK INTERCEPTOR ---
                const markdownLinks = appDiv.querySelectorAll('.markdown-body a');
                
                markdownLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    
                    // If the link starts with #, doesn't have a slash, and isn't a Class name
                    if (href && href.startsWith('#') && !href.includes('/') && !curriculum[href.substring(1)]) {
                        
                        link.addEventListener('click', (e) => {
                            e.preventDefault(); // Stop the router from changing the page
                            
                            const targetId = href.substring(1);
                            const targetElement = document.getElementById(targetId);
                            
                            if (targetElement) {
                                // Smoothly scroll to the header!
                                targetElement.scrollIntoView({ behavior: 'smooth' });
                            }
                        });
                    }
                });
                // --- END NEW CODE ---

            } catch (error) {
                appDiv.innerHTML = `
                    <div class="nav-buttons"><a href="#${className}" class="btn">← Back to Class</a></div>
                    <div class="error">
                        <strong>Error:</strong> Could not load <code>markdown/${className}/${assignmentName}.md</code>. <br>
                        Make sure the file exists and that you are running a local web server.
                    </div>
                `;
            }
        }

        // --- 7. EVENT LISTENERS ---
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
