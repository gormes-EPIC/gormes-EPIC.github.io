<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPIC Software Dev Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* Default Dark Mode Variables */
        :root {
            --primary: #b349f6;
            --bg: #231f25;
            --surface: #332d39;
            --text: #f8fafc;
            --border: #4b4255;
            
            --badge-note-bg: rgba(37, 99, 235, 0.2);
            --badge-note-text: #60a5fa;
            --badge-assign-bg: rgba(220, 38, 214, 0.2);
            --badge-assign-text: #f871e8;
            /* New Exercise Colors (Emerald Green) */
            --badge-exercise-bg: rgba(16, 185, 129, 0.2); 
            --badge-exercise-text: #34d399;
        }

        /* Automatically scale up the UI on screens wider than 1200px */
        @media (min-width: 1000px) {
            html {
                font-size: 20px;
            }
        }

        /* Light Mode Variables */
        body.light-mode {
            --primary: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            
            --badge-note-bg: #dbeafe;
            --badge-note-text: #1d4ed8;
            --badge-assign-bg: #fee2fd;
            --badge-assign-text: #b91c92;
            --badge-exercise-bg: #d1fae5;
            --badge-exercise-text: #059669;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }

        #app {
            max-width: 75%;
            margin: 2rem auto 0;
            background: var(--surface);
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: background-color 0.3s ease;
        }

        h1, h2, h3 { color: var(--primary); }
        
        /* Search Bar Styles */
        .search-container {
            margin-bottom: 2rem;
        }
        .search-bar {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Badges for Classification */
        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge-notes {
            background-color: var(--badge-note-bg);
            color: var(--badge-note-text);
        }
        .badge-assignment {
            background-color: var(--badge-assign-bg);
            color: var(--badge-assign-text);
        }
        /* New Exercise Badge Class */
        .badge-exercise {
            background-color: var(--badge-exercise-bg);
            color: var(--badge-exercise-text);
        }

        /* 2-Column Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            #app { padding: 1.5rem; }
        }

        .card {
            display: block;
            padding: 1.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: background-color 0.2s;
        }
        .list-item:hover { background: var(--surface); color: var(--primary); }
        .list-item-text {
            padding-right: 1rem; 
        }
        
        .nav-buttons { margin-bottom: 2rem; }
        
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .btn:hover { background: var(--bg); border-color: var(--primary); }
        
        /* Markdown Styles including Links */
        .markdown-body a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body img { max-width: 100%; border-radius: 6px; }
        /* Code Block & Copy Button Styles */
        /* 1. Wrapper: Match the VS Code/Atom Dark colors exactly */
        .markdown-body pre { 
            background: #1e1921; /* The official Atom One Dark background */
            padding: 1rem; 
            border-radius: 6px; 
            overflow-x: auto; 
            position: relative; 
            border: 1px solid #3e4451; /* A subtle border that matches the dark theme */
        }

        /* 2. Inner Code: Remove Highlight.js's default background and padding */
        .markdown-body pre code.hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0; /* Hidden by default... */
            transition: opacity 0.2s, background-color 0.2s, color 0.2s;
        }

        /* ...Revealed when you hover over the code block */
        .markdown-body pre:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: var(--bg);
            border-color: var(--primary);
            color: var(--primary);
        }
        /* Only style inline code, let Highlight.js handle the big blocks */
        .markdown-body :not(pre) > code { 
            background: var(--bg); 
            padding: 0.2rem 0.4rem; 
            border-radius: 4px; 
            /*color: var(--primary); /* Optional: makes inline code pop! */
        }
        .markdown-body a { color: #495cd8; }
        .error { color: #fca5a5; padding: 1rem; background: #7f1d1d; border-radius: 6px; }
        
        /* Markdown Table Styles */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse; /* This ensures borders combine into a single line */
            margin: 1.5rem 0;
        }

        .markdown-body th, 
        .markdown-body td {
            border: 1px solid var(--border); /* Uses your auto-switching border color */
            padding: 0.75rem 1rem; /* Adds the breathing room (top/bottom, left/right) */
            text-align: left;
        }

        .markdown-body th {
            background-color: var(--bg); /* Gives the header row a subtle contrasting background */
            font-weight: 600;
        }

        /* Expandable Details/Summary Sections */
        .markdown-body details {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 1.5rem 0;
            transition: all 0.2s ease;
        }

        .markdown-body summary {
            font-weight: 600;
            cursor: pointer;
            color: var(--primary);
            outline: none;
            list-style-position: inside; /* Keeps the little arrow aligned nicely */
        }

        /* Adds a nice dividing line when the section is expanded */
        .markdown-body details[open] summary {
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .markdown-body details:hover {
            border-color: var(--primary);
        }

        /* Blockquote Styling */
        .markdown-body blockquote {
            background: var(--bg); /* Uses your darker background color */
            border-left: 4px solid var(--primary); /* The classic colored indent line */
            padding: 1rem 1.5rem; /* Breathing room inside the box */
            margin: 1.5rem 0; /* Space above and below the quote */
            border-radius: 0 8px 8px 0; /* Rounds the right side, keeps the left side flat */
            opacity: 0.9; /* Makes the text slightly muted to differentiate it */
        }

        /* Removes the extra gap caused by paragraphs inside the quote */
        .markdown-body blockquote p {
            margin: 0;
        }
        /* Responsive Video Embeds */
        .markdown-body video,
        .markdown-body iframe {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 1.5rem 0;
            box-sizing: border-box;
        }

        /* Forces YouTube embeds to keep a perfect 16:9 widescreen shape */
        .markdown-body iframe {
            aspect-ratio: 16 / 9;
            height: auto;
            width: 100%;
        }

        /* PRINT MODE */
        @media print {
            /* 1. Hide everything that isn't the document itself */
            #theme-toggle,
            .nav-buttons,
            .search-container,
            .copy-btn,
            .toc-sidebar {
                display: none !important;
            }

            /* 2. Force a white background and black text */
            body, 
            #app, 
            .markdown-body {
                background: white !important;
                color: black !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* 3. Expand the main container to fill the page */
            #app {
                max-width: 100% !important;
                border: none !important;
            }

            /* 4. Format links for paper (black and underlined) */
            .markdown-body a {
                color: black !important;
                text-decoration: underline !important;
            }

            /* 5. Make code blocks printer-friendly */
            .markdown-body pre {
                background: #f8f9fa !important; /* Very light gray */
                border: 1px solid #ccc !important;
                color: black !important;
                white-space: pre-wrap !important; /* Forces long code lines to wrap instead of running off the page */
            }

            /* 6. Prevent awkward page breaks right in the middle of elements */
            .markdown-body pre, 
            .markdown-body blockquote, 
            .markdown-body img,
            .markdown-body table {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="btn">Toggle Theme</button>

    <div id="app"></div>

    <script src="curriculum.js"></script>

    <script>

        // --- 0. DARK MODE (DEFAULT) LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        const appDiv = document.getElementById('app');

        // --- 2. ROUTING LOGIC ---
        function render() {
            const hash = window.location.hash.substring(1); 
            
            if (!hash) {
                renderHub();
            } else if (hash.includes('/')) {
                const [className, assignmentName] = hash.split('/');
                renderAssignment(className, assignmentName);
            } else {
                renderClassPage(hash);
            }
        }

        // --- Helper Function to get Badge Class ---
        function getBadgeClass(type) {
            if (type === 'notes') return 'badge-notes';
            if (type === 'assignment') return 'badge-assignment';
            if (type === 'exercise') return 'badge-exercise';
            return ''; // Default fallback
        }

        // --- Helper Function to Render List Items ---
        function generateFileListHTML(className, files) {
            if (files.length === 0) return `<p>No matching files found.</p>`;
            
            let html = '';
            files.forEach(item => {
                const cleanFileName = item.file.replace(/-/g, ' ');
                const badgeClass = getBadgeClass(item.type);
                
                html += `
                    <a href="#${className}/${item.file}" class="list-item">
                        <span class="list-item-text">${cleanFileName}</span>
                        <span class="badge ${badgeClass}">${item.type.toUpperCase()}</span>
                    </a>
                `;
            });
            return html;
        }

        // --- 3. RENDER FUNCTIONS ---
        function renderHub() {
            let html = `
                <h1>EPIC Software Development Courses</h1>
                
                <div class="search-container">
                    <input type="text" id="search-input" class="search-bar" placeholder="Search all files globally...">
                </div>

                <div id="default-view">
                    <p>Select a class to view assignments and notes:</p>
                    <div class="grid">
            `;
            
            for (const className in curriculum) {
                const displayName = className.replace(/-/g, ' '); 
                html += `<a href="#${className}" class="card">${displayName}</a>`;
            }
            
            html += `
                    </div>
                </div>
                <div id="search-results"></div>
            `;
            
            appDiv.innerHTML = html;
            document.getElementById('search-input').addEventListener('input', handleGlobalSearch);
        }

        // --- 4. GLOBAL SEARCH LOGIC ---
        function handleGlobalSearch(event) {
            const query = event.target.value.toLowerCase();
            const defaultView = document.getElementById('default-view');
            const searchResults = document.getElementById('search-results');

            if (query.trim() === '') {
                defaultView.style.display = 'block';
                searchResults.innerHTML = '';
                return;
            }

            defaultView.style.display = 'none';
            let resultsHtml = `<h3>Search Results</h3><div>`;
            let matchCount = 0;

            for (const className in curriculum) {
                curriculum[className].forEach(item => {
                    const cleanFileName = item.file.replace(/-/g, ' ');
                    const cleanClassName = className.replace(/-/g, ' ');
                    
                    if (cleanFileName.toLowerCase().includes(query) || 
                        cleanClassName.toLowerCase().includes(query) ||
                        item.type.toLowerCase().includes(query)) {
                        
                        const badgeClass = getBadgeClass(item.type);
                        
                        resultsHtml += `
                            <a href="#${className}/${item.file}" class="list-item">
                                <span class="list-item-text"><strong>${cleanClassName}</strong>: ${cleanFileName}</span>
                                <span class="badge ${badgeClass}">${item.type.toUpperCase()}</span>
                            </a>
                        `;
                        matchCount++;
                    }
                });
            }

            resultsHtml += `</div>`;

            if (matchCount === 0) {
                searchResults.innerHTML = `<p>No files found matching "${query}".</p>`;
            } else {
                searchResults.innerHTML = resultsHtml;
            }
        }

        // --- 5. CLASS PAGE WITH SEARCH ---
        function renderClassPage(className) {
            if (!curriculum[className]) return renderHub(); 
            
            const displayName = className.replace(/-/g, ' ');
            let html = `
                <div class="nav-buttons">
                    <a href="#" class="btn">← Back to Hub</a>
                </div>
                <h2>${displayName} Files</h2>
                
                <div class="search-container">
                    <input type="text" id="class-search-input" class="search-bar" placeholder="Search within ${displayName}...">
                </div>

                <div id="class-file-list">
                    ${generateFileListHTML(className, curriculum[className])}
                </div>
            `;
            
            appDiv.innerHTML = html;

            document.getElementById('class-search-input').addEventListener('input', (event) => {
                const query = event.target.value.toLowerCase();
                
                const filteredFiles = curriculum[className].filter(item => {
                    const cleanFileName = item.file.replace(/-/g, ' ').toLowerCase();
                    return cleanFileName.includes(query) || item.type.includes(query);
                });
                
                document.getElementById('class-file-list').innerHTML = generateFileListHTML(className, filteredFiles);
            });
        }

        // --- 6. RENDER INDIVIDUAL FILE ---
        async function renderAssignment(className, assignmentName) {
            appDiv.innerHTML = `<p>Loading...</p>`;
            try {
                const response = await fetch(`markdown/${className}/${assignmentName}.md`);
                if (!response.ok) throw new Error('Markdown file not found.');
                
                const markdownText = await response.text();
                const htmlContent = marked.parse(markdownText); 
                
                appDiv.innerHTML = `
                    <div class="nav-buttons">
                        <a href="#${className}" class="btn">← Back to Class</a>
                    </div>
                    <div class="markdown-body">
                        ${htmlContent}
                    </div>
                `;
                // Highting code blocks with Highlight.js
                // appDiv.querySelectorAll('.markdown-body pre code').forEach((block) => {
                //     // marked.js adds a "language-X" class if you specify a language.
                //     // We only want to highlight if that class exists.
                //     if (block.className.includes('language-')) {
                //         hljs.highlightElement(block);
                //     } else {
                //         // For plain text blocks, just add the base class so it 
                //         // gets the correct background, but skips the auto-coloring
                //         block.classList.add('hljs'); 
                //     }
                // });
                
                const codeBlocks = appDiv.querySelectorAll('.markdown-body pre');
                
                codeBlocks.forEach(pre => {
                    // Create the button element
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = 'Copy';
                    
                    // Add the click event to copy text
                    copyBtn.addEventListener('click', () => {
                        // Find the actual <code> element inside the <pre>
                        const codeElement = pre.querySelector('code');
                        if (!codeElement) return;

                        // Use the modern clipboard API
                        navigator.clipboard.writeText(codeElement.innerText).then(() => {
                            // Give the user visual feedback
                            copyBtn.textContent = 'Copied!';
                            copyBtn.style.color = '#34d399'; // Turn green temporarily
                            copyBtn.style.borderColor = '#34d399';
                            
                            // Reset the button after 2 seconds
                            setTimeout(() => {
                                copyBtn.textContent = 'Copy';
                                copyBtn.style.color = '';
                                copyBtn.style.borderColor = '';
                            }, 2000);
                        }).catch(err => {
                            console.error('Failed to copy text: ', err);
                            copyBtn.textContent = 'Error';
                        });
                    });
                    
                    // Append the button to the pre block
                    pre.appendChild(copyBtn);
                });
                
                // We wrap this in a setTimeout of 0 to ensure the DOM has updated
                // and the KaTeX script has fully loaded before it tries to run.
                setTimeout(() => {
                    if (window.renderMathInElement) {
                        renderMathInElement(appDiv, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true}, // Block math
                                {left: '$', right: '$', display: false}   // Inline math
                            ],
                            throwOnError: false // Prevents the whole page from breaking if you make a typo in your math
                        });
                    }
                }, 0);

                const markdownLinks = appDiv.querySelectorAll('.markdown-body a');
                
                markdownLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    
                    // If the link starts with #, doesn't have a slash, and isn't a Class name
                    if (href && href.startsWith('#') && !href.includes('/') && !curriculum[href.substring(1)]) {
                        
                        link.addEventListener('click', (e) => {
                            e.preventDefault(); // Stop the router from changing the page
                            
                            const targetId = href.substring(1);
                            const targetElement = document.getElementById(targetId);
                            
                            if (targetElement) {
                                // Smoothly scroll to the header!
                                targetElement.scrollIntoView({ behavior: 'smooth' });
                            }
                        });
                    }
                });

            } catch (error) {
                appDiv.innerHTML = `
                    <div class="nav-buttons"><a href="#${className}" class="btn">← Back to Class</a></div>
                    <div class="error">
                        <strong>Error:</strong> Could not load <code>markdown/${className}/${assignmentName}.md</code>. <br>
                        Make sure the file exists and that you are running a local web server.
                    </div>
                `;
            }
        }

        // --- 7. EVENT LISTENERS ---
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
