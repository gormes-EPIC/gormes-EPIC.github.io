<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Default Dark Mode Variables */
        :root {
            --primary: #60a5fa;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        /* Light Mode Variables */
        body.light-mode {
            --primary: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }

        #app {
            max-width: 800px;
            margin: 2rem auto 0;
            background: var(--surface);
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); /* Slightly darker shadow for dark mode */
            transition: background-color 0.3s ease;
        }

        h1, h2, h3 { color: var(--primary); }
        
        /* Search Bar Styles */
        .search-container {
            margin-bottom: 2rem;
        }
        .search-bar {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 2-Column Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            #app { padding: 1.5rem; }
        }

        .card {
            display: block;
            padding: 1.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        
        .list-item {
            display: block;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }
        .list-item:hover { background: var(--surface); color: var(--primary); }
        
        .nav-buttons { margin-bottom: 2rem; }
        
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .btn:hover { background: var(--bg); border-color: var(--primary); }
        
        .markdown-body img { max-width: 100%; border-radius: 6px; }
        .markdown-body pre { background: var(--bg); padding: 1rem; border-radius: 6px; overflow-x: auto; }
        .markdown-body code { background: var(--bg); padding: 0.2rem 0.4rem; border-radius: 4px; }
        .error { color: #fca5a5; padding: 1rem; background: #7f1d1d; border-radius: 6px; }
    </style>
</head>
<body>

    <button id="theme-toggle" class="btn">🌗 Toggle Theme</button>

    <div id="app"></div>

    <script>
        // --- 0. DARK MODE (DEFAULT) LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Check if the user previously saved a LIGHT mode preference
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            // Save preference to local storage based on the light-mode class
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        // --- 1. CURRICULUM DATA ---
        const curriculum = {
            "Class-1": ["assignment-1", "assignment-2"],
            "Class-2": ["assignment-1"],
            "Class-3": ["project"],
            "Class-4": ["notes"]
        };

        const appDiv = document.getElementById('app');

        // --- 2. ROUTING LOGIC ---
        function render() {
            const hash = window.location.hash.substring(1); 
            
            if (!hash) {
                renderHub();
            } else if (hash.includes('/')) {
                const [className, assignmentName] = hash.split('/');
                renderAssignment(className, assignmentName);
            } else {
                renderClassPage(hash);
            }
        }

        // --- 3. RENDER FUNCTIONS ---
        function renderHub() {
            let html = `
                <h1>Central Hub</h1>
                
                <div class="search-container">
                    <input type="text" id="search-input" class="search-bar" placeholder="Search for an assignment...">
                </div>

                <div id="default-view">
                    <p>Select a class to view assignments:</p>
                    <div class="grid">
            `;
            
            for (const className in curriculum) {
                const displayName = className.replace(/-/g, ' '); 
                html += `<a href="#${className}" class="card">${displayName}</a>`;
            }
            
            html += `
                    </div>
                </div>
                <div id="search-results"></div>
            `;
            
            appDiv.innerHTML = html;
            document.getElementById('search-input').addEventListener('input', handleSearch);
        }

        // --- 4. SEARCH LOGIC ---
        function handleSearch(event) {
            const query = event.target.value.toLowerCase();
            const defaultView = document.getElementById('default-view');
            const searchResults = document.getElementById('search-results');

            if (query.trim() === '') {
                defaultView.style.display = 'block';
                searchResults.innerHTML = '';
                return;
            }

            defaultView.style.display = 'none';
            let resultsHtml = `<h3>Search Results</h3><div>`;
            let matchCount = 0;

            for (const className in curriculum) {
                curriculum[className].forEach(assignment => {
                    const cleanAssignmentName = assignment.replace(/-/g, ' ');
                    const cleanClassName = className.replace(/-/g, ' ');
                    
                    if (cleanAssignmentName.toLowerCase().includes(query) || cleanClassName.toLowerCase().includes(query)) {
                        resultsHtml += `<a href="#${className}/${assignment}" class="list-item">
                            📄 <strong>${cleanClassName}</strong>: ${cleanAssignmentName}
                        </a>`;
                        matchCount++;
                    }
                });
            }

            resultsHtml += `</div>`;

            if (matchCount === 0) {
                searchResults.innerHTML = `<p>No assignments found matching "${query}".</p>`;
            } else {
                searchResults.innerHTML = resultsHtml;
            }
        }

        function renderClassPage(className) {
            if (!curriculum[className]) return renderHub(); 
            
            const displayName = className.replace(/-/g, ' ');
            let html = `
                <div class="nav-buttons">
                    <a href="#" class="btn">← Back to Hub</a>
                </div>
                <h2>${displayName} Assignments</h2>
                <div>
            `;
            
            curriculum[className].forEach(assignment => {
                const assignmentName = assignment.replace(/-/g, ' ');
                html += `<a href="#${className}/${assignment}" class="list-item">📄 ${assignmentName}</a>`;
            });
            
            html += `</div>`;
            appDiv.innerHTML = html;
        }

        async function renderAssignment(className, assignmentName) {
            appDiv.innerHTML = `<p>Loading...</p>`;
            try {
                const response = await fetch(`markdown/${className}/${assignmentName}.md`);
                if (!response.ok) throw new Error('Markdown file not found.');
                
                const markdownText = await response.text();
                const htmlContent = marked.parse(markdownText); 
                
                appDiv.innerHTML = `
                    <div class="nav-buttons">
                        <a href="#${className}" class="btn">← Back to Class</a>
                    </div>
                    <div class="markdown-body">
                        ${htmlContent}
                    </div>
                `;
            } catch (error) {
                appDiv.innerHTML = `
                    <div class="nav-buttons"><a href="#${className}" class="btn">← Back to Class</a></div>
                    <div class="error">
                        <strong>Error:</strong> Could not load <code>markdown/${className}/${assignmentName}.md</code>. <br>
                        Make sure the file exists and that you are running a local web server.
                    </div>
                `;
            }
        }

        // --- 5. EVENT LISTENERS ---
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
